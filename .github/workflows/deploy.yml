name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main
      - chore/add-deploy-workflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/songrec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "backend/songrec/build/libs/*.jar"
          target: "/home/ubuntu/deploy"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            JAR_FILE=$(find /home/ubuntu/deploy -name "*.jar" | head -n 1)
            cp "$JAR_FILE" /home/ubuntu/songrec-0.0.1-SNAPSHOT.jar
            sudo systemctl restart songrec
            sudo systemctl status songrec --no-pager